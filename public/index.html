<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FreeLocalCamViewer</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <strong>FreeLocalCamViewer</strong>
      <span class="muted" id="cam-count">0 cameras</span>
    </div>
    <div class="actions">
      <label class="cols">
        Columns
        <select id="cols">
          <option>1</option><option>2</option><option selected>3</option>
          <option>4</option><option>5</option><option>6</option>
        </select>
      </label>
      <button id="btn-discover">Scan LAN</button>
      <button id="btn-add">Add manually</button>
      <button id="btn-edit-mode">Edit layout</button>
    </div>
  </header>

  <main id="grid" class="grid cols-3"></main>

  <!-- Discover modal -->
  <div class="modal" id="m-discover" hidden>
    <div class="modal-card">
      <header>
        <h2>Scan local network</h2>
        <button class="x" data-close>&times;</button>
      </header>
      <div id="discover-status" class="muted">Scanning…</div>
      <div class="toolbar">
        <label class="muted"><input type="checkbox" id="filter-cameras" checked /> Cameras only</label>
        <label class="muted"><input type="checkbox" id="select-all" /> Select all</label>
        <span class="grow"></span>
        <button id="btn-rescan">Rescan</button>
        <button id="btn-batch-add" class="primary" disabled>Add selected</button>
      </div>
      <ul id="discover-list" class="device-list"></ul>
      <footer>
        <span class="muted" id="discover-meta"></span>
        <button data-close>Close</button>
      </footer>
    </div>
  </div>

  <!-- Batch-add credentials modal -->
  <div class="modal" id="m-batch" hidden>
    <div class="modal-card">
      <header><h2>Add <span id="batch-count">0</span> camera(s)</h2><button class="x" data-close>&times;</button></header>
      <form id="batch-form">
        <p class="muted">These credentials will be used for every selected camera. RTSP &amp; snapshot URLs are filled in from the vendor template.</p>
        <div class="row">
          <label class="grow">Username <input name="username" autocomplete="off" /></label>
          <label class="grow">Password <input name="password" type="password" autocomplete="off" /></label>
        </div>
        <label>Poll interval (ms) <input name="poll_ms" type="number" value="400" min="100" max="10000" /></label>
        <div class="row end">
          <button type="button" data-close>Cancel</button>
          <button type="submit" class="primary">Add all</button>
        </div>
        <div id="batch-status" class="muted"></div>
      </form>
    </div>
  </div>

  <!-- Add / edit modal -->
  <div class="modal" id="m-edit" hidden>
    <div class="modal-card">
      <header><h2 id="edit-title">Add camera</h2><button class="x" data-close>&times;</button></header>
      <form id="edit-form">
        <input type="hidden" name="id" />
        <label>Name <input name="name" required placeholder="Front door" /></label>
        <div class="row">
          <label class="grow">Host / IP <input name="host" required placeholder="192.168.1.50" /></label>
          <label>Port <input name="port" type="number" value="80" /></label>
        </div>
        <div class="row">
          <label class="grow">Username <input name="username" autocomplete="off" /></label>
          <label class="grow">Password <input name="password" type="password" autocomplete="off" /></label>
        </div>
        <label>RTSP URL <input name="rtsp_url" placeholder="auto-detected via ONVIF" /></label>
        <label>Snapshot URL <input name="snapshot_url" placeholder="auto-detected via ONVIF" /></label>
        <label>Poll interval (ms) <input name="poll_ms" type="number" value="400" min="100" max="10000" /></label>
        <div class="row end">
          <button type="button" id="btn-probe">Probe via ONVIF</button>
          <button type="submit">Save</button>
        </div>
        <div id="edit-status" class="muted"></div>
      </form>
    </div>
  </div>

  <script src="/app.js" type="module"></script>
</body>
</html>
